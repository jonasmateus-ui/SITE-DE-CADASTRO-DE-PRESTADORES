<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — Conecta Comunidade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
      color: white;
      min-height: 100vh;
    }
    .form-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

<nav class="p-6">
  <a href="/" class="text-2xl font-bold tracking-tighter">Conecta<span class="text-purple-500">.</span></a>
</nav>

<div class="flex items-center justify-center px-4 py-12">
  <div class="form-card w-full max-w-md p-8 rounded-3xl shadow-2xl">
    <h2 class="text-3xl font-bold mb-2">Criar conta de cliente</h2>
    <p class="text-gray-400 mb-8">Encontre profissionais perto de você em segundos.</p>

    <div id="error-msg" class="hidden bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-xl mb-6 text-sm"></div>

    <form id="cadastroForm">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2 text-gray-300">Nome completo</label>
        <input type="text" id="nome" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 transition" placeholder="Seu nome" required>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-2 text-gray-300">E-mail</label>
        <input type="email" id="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 transition" placeholder="seu@email.com" required>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium mb-2 text-gray-300">Senha</label>
        <input type="password" id="senha" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 transition" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>

      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-bold text-lg shadow-lg shadow-purple-500/20 transition-all active:scale-95">
        Criar conta
      </button>
    </form>

    <div class="mt-8 text-center space-y-2">
      <p class="text-gray-400 text-sm">Já tem conta? <a href="/login" class="text-purple-400 font-semibold hover:underline">Entrar</a></p>
      <p class="text-gray-400 text-sm">É profissional? <a href="/cadastro_prestador" class="text-purple-400 font-semibold hover:underline">Cadastrar como Prestador</a></p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
apiKey: "AIzaSyAyZrw4sWqJg_J-HLVbliNt6n-tBdcty14",
authDomain: "cadastro-brabo.firebaseapp.com",
projectId: "cadastro-brabo",
storageBucket: "cadastro-brabo.firebasestorage.app",
messagingSenderId: "741810547986",
appId: "1:741810547986:web:7ba7f6fa1b2273db9257cb",
measurementId: "G-98VJ04Q09N"
        };


  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  const form = document.getElementById('cadastroForm');
  const errorDiv = document.getElementById('error-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.classList.add('hidden');

    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;

    try {
      // 1. Cria o usuário no Firebase Auth
      const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
      const user = userCredential.user;

      // 2. Salva os dados adicionais no Realtime Database
      await db.ref('clientes/' + user.uid).set({
        nome: nome,
        email: email,
        tipo: 'cliente',
        dataCriacao: new Date().toISOString()
      });

      alert('Conta criada com sucesso!');
      window.location.href = "/"; // Redireciona para o início

    } catch (error) {
      errorDiv.innerText = "Erro: " + error.message;
      errorDiv.classList.remove('hidden');
    }
  });
</script>

</body>
</html>
