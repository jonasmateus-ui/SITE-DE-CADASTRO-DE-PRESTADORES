<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — Conecta Comunidade</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Conecta<span>.</span></a>
</nav>

<div class="section" style="display:flex;align-items:center;min-height:calc(100vh - 64px);padding-top:2rem">
  <div class="form-wrap" style="width:100%">
    <h2>Criar conta de cliente</h2>
    <p class="sub">Encontre profissionais perto de você em segundos.</p>

    {% if erro %}
    <div class="error-msg">{{ erro }}</div>
    {% endif %}

    <form action="/salvar_cliente" method="POST">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="nome" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn btn-gold btn-full" style="margin-top:.5rem">Criar conta</button>
    </form>

    <div class="form-link" style="margin-top:1rem">
      Já tem conta? <a href="/login">Entrar</a>
    </div>
    <div class="form-link">
      É profissional? <a href="/cadastro_prestador">Cadastrar como Prestador</a>
    </div>
  </div>
</div>

</body>
</html>
