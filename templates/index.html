<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivulgaPrest | Cadastro com IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <h1>DivulgaPrest 🚀</h1>
        <p>Conectando profissionais e clientes</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>Cadastrar Novo Profissional</h2>
            <form action="/cadastrar" method="POST">
                <div class="input-group">
                    <label>Nome Completo:</label>
                    <input type="text" name="nome" required placeholder="Ex: Jonas Araújo">
                </div>

                <div class="input-group">
                    <label>Profissão/Serviço:</label>
                    <input type="text" id="servico_input" name="servico" required placeholder="Ex: Encanador, Desenvolvedor Python">
                </div>

                <div class="input-group">
                    <label>Localização:</label>
                    <input type="text" name="local" required placeholder="Ex: São Paulo - SP">
                </div>

                <div class="input-group">
                    <label>Bio Profissional:</label>
                    <textarea id="bio_input" name="bio" rows="4" placeholder="Escreva sobre você ou use a IA abaixo..."></textarea>
                    
                    <button type="button" class="btn-ia" onclick="gerarBioComIA()">
                        ✨ Sugerir Bio com Inteligência Artificial
                    </button>
                </div>

                <button type="submit" class="btn-salvar">Salvar Cadastro</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>Profissionais Cadastrados</h2>
            <div class="lista-grids">
                {% for p in prestadores %}
                <div class="prestador-card">
                    <h3>{{ p.nome }}</h3>
                    <p><strong>Serviço:</strong> {{ p.servico }}</p>
                    <p><strong>Local:</strong> {{ p.local }}</p>
                    <p class="bio-text">{{ p.bio }}</p>
                </div>
                {% else %}
                <p>Nenhum profissional cadastrado ainda.</p>
                {% endfor %}
            </div>
        </section>
    </main>
