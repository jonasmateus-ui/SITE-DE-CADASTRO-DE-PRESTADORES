<script>
    async function falarComTobias() {
        const msg = document.getElementById('campo-tobias').value;
        const res = await fetch('/tobias', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ mensagem: msg })
        });
        const data = await res.json();
        alert("Tobias diz: " + data.resposta); // Ou exiba onde você preferir no seu layout
    }
</script>
