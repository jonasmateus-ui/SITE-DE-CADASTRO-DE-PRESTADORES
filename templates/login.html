<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Conecta Comunidade</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Conecta<span>.</span></a>
</nav>

<div class="section" style="display:flex;align-items:center;min-height:calc(100vh - 64px);padding-top:2rem">
  <div class="form-wrap" style="width:100%">
    <h2>Bem-vindo de volta</h2>
    <p class="sub">Entre na sua conta para continuar.</p>

    {% if erro %}
    <div class="error-msg">{{ erro }}</div>
    {% endif %}

    <form action="/login_validar" method="POST">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-gold btn-full" style="margin-top:.5rem">Entrar</button>
    </form>

    <div class="form-divider">ou</div>

    <div class="form-link">
      Não tem conta?
      <a href="/cadastro_cliente">Cadastrar como Cliente</a> ·
      <a href="/cadastro_prestador">Cadastrar como Prestador</a>
    </div>
  </div>
</div>

</body>
</html>
